<!--
              PRÁCTICA 5: Integración, automatización y modelo de negocio
        Interfaz de usuario para generación de texto con modelo generativo
                     Programación de Inteligencia Artificial

Este archivo HTML es la interfaz de usuario para la práctica 5, diseñada para interactuar con un modelo generativo a través de un endpoint remoto. La estructura del documento incluye un formulario para configurar los parámetros de generación, un área para mostrar el texto generado, y elementos para mostrar el estado y el tiempo transcurrido.

DESARROLLADO POR:   José A. Rodríguez López
FECHA: 29 de Marzo, 2026
PROYECTO: Programación de Inteligencia Artificial
================================================================================
-->

<!doctype html>
<html lang="es">
  <head>
    <!-- Metadatos base y recursos de estilo global -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Práctica 5 | IA Integrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <!-- Fondo animado decorativo -->
    <canvas id="fondoCircuito"></canvas>

    <!-- Contenido principal de la interfaz -->
    <main class="contenedor-principal">
      <!-- Encabezado de la práctica -->
      <section class="cabecera">
        <h1>Integración tecnológica con modelo generativo</h1>
      </section>

      <!-- Panel de entrada: configuración y envío de generación -->
      <section class="panel panel-principal">
        <form id="formulario-generador" class="formulario-cuadricula">
          <p class="resumen-endpoint">
            Endpoint remoto: <strong id="urlApiRemota">cargando...</strong>
          </p>

          <div class="acciones">
            <button id="botonConexion" type="button" class="boton-secundario">Probar conexión remota</button>
          </div>

          <label>
            Semilla de texto
            <textarea
              id="semilla"
              rows="4"
              placeholder="Ejemplo: En una ciudad inteligente, los sensores detectaron..."
              required
            ></textarea>
          </label>

          <div class="fila dos-columnas">
            <label>
              Número de palabras
              <input id="numeroPalabras" type="number" min="1" max="100" value="40" />
            </label>

            <label>
              Estrategia
              <select id="estrategia">
                <option value="greedy">Greedy</option>
                <option value="sampling">Sampling</option>
                <option value="top_k">Top-K</option>
              </select>
            </label>
          </div>

          <div class="fila dos-columnas">
            <label>
              Temperatura
              <input id="temperatura" type="number" min="0.1" max="2" step="0.1" value="1.0" />
            </label>

            <label>
              Top-K
              <input id="topK" type="number" min="1" max="500" value="40" />
            </label>
          </div>

          <div class="acciones">
            <button id="botonGenerar" type="submit">Generar texto</button>
            <button id="botonHablar" type="button" class="boton-secundario">Hablar resultado</button>
            <button id="botonDetenerVoz" type="button" class="boton-secundario">Detener voz</button>
          </div>
        </form>
      </section>

      <!-- Panel de salida: estado y texto generado -->
      <section class="panel panel-secundario contenedor-salida">
        <div class="metadatos-estado">
          <span id="estado">Listo</span>
          <span id="tiempoTranscurrido"></span>
        </div>
        <article id="salidaGenerada" class="salida-generada" aria-live="polite">
          El texto generado aparecerá aquí.
        </article>
      </section>
    </main>

    <!-- Pie de página con créditos -->
    <footer class="pie-sitio">
        <p>Desarrollado por: José A. Rodríguez López</p>
        <p class="texto-destacado">Programación de IA · Práctica 5</p>
    </footer>

    <!-- Scripts de animación de fondo y lógica de interacción -->
    <script src="/static/circuito-bg.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
